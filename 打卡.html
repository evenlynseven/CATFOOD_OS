<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CATFOOD_OS v8.3 // FINAL RELEASE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #050505;
            --panel-bg: rgba(20, 20, 23, 0.9);
            --border-dim: rgba(255, 255, 255, 0.1);
            --cyan: #06b6d4; 
            --purple: #8b5cf6; 
            --yellow: #f59e0b;
            --font-ui: 'Inter', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
        }
        
        body { 
            background-color: var(--bg-deep); 
            background-image: radial-gradient(circle at 50% 0%, #1a1b26 0%, var(--bg-deep) 70%);
            color: #e4e4e7; 
            font-family: var(--font-ui);
            overflow: hidden; 
        }
        
        .glass-panel { 
            background: var(--panel-bg); 
            backdrop-filter: blur(20px); 
            border: 1px solid var(--border-dim); 
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4); 
        }

        /* 1. Ritual Cards */
        .ritual-card {
            background: #0f0f12; border: 1px solid #27272a; border-radius: 12px; 
            padding: 16px; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between;
            min-height: 140px;
        }
        .ritual-card:hover { transform: translateY(-3px); border-color: #555; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .ritual-card.active { border-color: var(--yellow); background: rgba(245, 158, 11, 0.08); }
        .h-dot { width: 6px; height: 6px; border-radius: 50%; background: #333; }
        .h-dot.filled { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }

        /* 2. Calendar Grid */
        .week-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 8px; }
        .week-day { text-align: center; font-size: 10px; color: #555; font-weight: bold; font-family: var(--font-code); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .cal-cell { 
            aspect-ratio: 1; background: #0f0f12; border: 1px solid #27272a; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; position: relative;
        }
        .cal-cell:hover { background: #1f1f23; border-color: #666; z-index: 10; transform: scale(1.05); }
        .cal-cell.empty { background: transparent; border: none; cursor: default; }
        .cal-date { font-size: 12px; font-weight: 600; color: #555; font-family: var(--font-code); }
        .heat-1 { border-color: #4c1d95; background: rgba(76, 29, 149, 0.3); } .heat-1 .cal-date { color: #a78bfa; }
        .heat-2 { border-color: var(--purple); background: rgba(139, 92, 246, 0.3); box-shadow: 0 0 10px rgba(139, 92, 246, 0.2); } .heat-2 .cal-date { color: #fff; }
        .heat-3 { border-color: var(--cyan); background: rgba(6, 182, 212, 0.3); box-shadow: 0 0 15px rgba(6, 182, 212, 0.3); } .heat-3 .cal-date { color: #fff; text-shadow: 0 0 5px var(--cyan); }

        /* 3. Blackbox Specifics */
        .tag-pill { border: 1px solid #333; color: #666; padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
        .tag-pill:hover { border-color: #555; color: #aaa; }
        .tag-pill.active { border-color: var(--cyan); color: var(--cyan); background: rgba(6, 182, 212, 0.1); }
        .filter-pill { border: 1px solid #27272a; color: #555; padding: 2px 10px; border-radius: 99px; font-size: 11px; cursor: pointer; transition: all 0.2s; }
        .filter-pill:hover { color: #888; border-color: #444; }
        .filter-pill.active { border-color: var(--cyan); color: var(--cyan); background: rgba(6, 182, 212, 0.1); }
        .timeline-item { position: relative; padding-left: 24px; margin-bottom: 24px; border-left: 1px solid #333; }
        .timeline-item:last-child { border-left: none; }
        .t-dot { position: absolute; left: -5px; top: 6px; width: 9px; height: 9px; border-radius: 50%; background: var(--bg-deep); border: 2px solid var(--purple); }

        /* General & V8.3 Final XP Bar Styles */
        .progress-track { background: #1a1a1d; height: 6px; border-radius: 3px; overflow: hidden; }
        /* V8.3 NEW XP STYLE */
        .xp-track-final { height: 14px; background: #09090b; border-radius: 99px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
        .xp-fill-final { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #0891b2, #22d3ee); box-shadow: 0 0 15px rgba(34, 211, 238, 0.5); transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1); }

        .nav-btn { font-family: var(--font-ui); letter-spacing: 0.02em; }
        .nav-btn.active { color: white; background: linear-gradient(90deg, rgba(255,255,255,0.05) 0%, transparent 100%); border-left: 3px solid var(--cyan); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); z-index: 60; display: none; align-items: center; justify-content: center; }
        .del-btn { opacity: 0; transition: opacity 0.2s; }
        .group:hover .del-btn { opacity: 1; }
    </style>
</head>
<body class="flex h-screen selection:bg-cyan-500/30">

    <aside class="w-64 bg-[#08080a] border-r border-white/5 flex flex-col justify-between p-6 z-20 shrink-0">
        <div>
            <div class="mb-10 pl-2">
                <h1 class="text-xl font-black italic tracking-tighter text-white font-ui">CATFOOD_OS <span class="text-[10px] not-italic text-gray-600 font-normal">v8.3</span></h1>
                <div class="mt-2 font-code text-xs text-cyan-500 flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <span id="clock-time">00:00:00</span>
                </div>
            </div>

            <nav class="space-y-1 mb-8">
                <button onclick="router('daily')" id="nav-daily" class="nav-btn active w-full flex items-center gap-3 px-4 py-3 rounded-r-lg text-sm font-semibold text-gray-400 hover:bg-white/5 transition-all group">
                    <i class="fa-solid fa-bolt w-5 text-center group-hover:text-yellow-400 transition-colors"></i> 战术执行
                </button>
                <button onclick="router('plan')" id="nav-plan" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-r-lg text-sm font-semibold text-gray-400 hover:bg-white/5 transition-all group">
                    <i class="fa-solid fa-chess w-5 text-center group-hover:text-purple-400 transition-colors"></i> 战略部署
                </button>
                <button onclick="router('stats')" id="nav-stats" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-r-lg text-sm font-semibold text-gray-400 hover:bg-white/5 transition-all group">
                    <i class="fa-solid fa-chart-pie w-5 text-center group-hover:text-cyan-400 transition-colors"></i> 能量监控
                </button>
                <button onclick="router('review')" id="nav-review" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-r-lg text-sm font-semibold text-gray-400 hover:bg-white/5 transition-all group">
                    <i class="fa-solid fa-box-archive w-5 text-center group-hover:text-pink-400 transition-colors"></i> 黑匣子
                </button>
            </nav>

            <div class="space-y-4 pt-4 border-t border-white/5">
                <h4 class="text-[9px] text-gray-500 font-bold uppercase tracking-widest mb-2 font-code">ATTRIBUTES</h4>
                <div><div class="flex justify-between text-[10px] text-gray-400 mb-1 font-code"><span>INT [智力]</span> <span id="val-int" class="text-white">0</span></div><div class="progress-track"><div id="bar-int" class="h-full bg-blue-500 transition-all duration-500" style="width: 0%"></div></div></div>
                <div><div class="flex justify-between text-[10px] text-gray-400 mb-1 font-code"><span>VIT [活力]</span> <span id="val-vit" class="text-white">0</span></div><div class="progress-track"><div id="bar-vit" class="h-full bg-green-500 transition-all duration-500" style="width: 0%"></div></div></div>
                <div><div class="flex justify-between text-[10px] text-gray-400 mb-1 font-code"><span>CHR [魅力]</span> <span id="val-chr" class="text-white">0</span></div><div class="progress-track"><div id="bar-chr" class="h-full bg-pink-500 transition-all duration-500" style="width: 0%"></div></div></div>
            </div>
        </div>

        <div class="pt-4 border-t border-white/5 flex justify-between items-end">
            <div class="flex-1 mr-4">
                <div class="flex justify-between items-center mb-1"><span class="text-[9px] text-gray-500 font-bold uppercase font-code">Total XP</span><span id="total-xp" class="text-[10px] font-code text-cyan-400">0</span></div>
                <div class="xp-track-final mt-1"><div id="xp-bar" class="xp-fill-final" style="width: 0%"></div></div>
            </div>
            <button onclick="openDataModal()" class="text-gray-600 hover:text-white transition-colors mb-1" title="Data Console"><i class="fa-solid fa-database"></i></button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative">
        <header class="px-8 py-6 flex justify-between items-end z-10 shrink-0 border-b border-white/5 bg-[#050505]/50 backdrop-blur-sm">
            <div>
                <h2 id="page-title" class="text-3xl font-black text-white mb-1 tracking-tight font-ui">今日行动代号</h2>
                <p id="page-subtitle" class="text-gray-500 text-xs font-code uppercase border-l-2 border-cyan-500 pl-3">/// TACTICAL OPERATIONS</p>
            </div>
            <div id="header-action"></div>
        </header>

        <div id="app-container" class="flex-1 p-8 overflow-y-auto custom-scroll z-10"></div>
    </main>

    <div id="add-modal" class="modal-overlay" onclick="if(event.target===this) this.style.display='none'">
        <div class="modal-content bg-[#131316] border border-gray-700 w-[420px] p-6 rounded-xl shadow-2xl">
            <h3 class="text-white font-bold mb-6 text-lg font-ui">新增指令</h3>
            <div class="mb-5"><label class="text-[10px] text-gray-500 uppercase font-bold mb-2 block font-code">MISSION TITLE</label><input type="text" id="new-task-title" placeholder="输入任务名称..." class="w-full bg-[#08080a] border border-gray-700 text-white p-3 rounded-lg outline-none focus:border-cyan-500 transition-colors font-ui text-sm"></div>
            <div class="grid grid-cols-2 gap-4 mb-5">
                <div><label class="text-[10px] text-gray-500 uppercase font-bold mb-2 block font-code">TYPE</label><div class="flex gap-2"><button onclick="setTaskType('work')" id="btn-type-work" class="flex-1 py-2 rounded border text-xs font-bold transition-all border-blue-500/50 bg-blue-500/10 text-blue-400">⚡ WORK</button><button onclick="setTaskType('ritual')" id="btn-type-ritual" class="flex-1 py-2 rounded border text-xs font-bold transition-all border-gray-700 text-gray-500">🧘 LIFE</button></div></div>
                <div><label class="text-[10px] text-gray-500 uppercase font-bold mb-2 block font-code">PRIORITY (XP)</label><div class="flex gap-1"><button onclick="setXP(10)" id="xp-10" class="flex-1 py-2 rounded border border-gray-700 text-[10px] text-gray-400 hover:bg-gray-800">10</button><button onclick="setXP(30)" id="xp-30" class="flex-1 py-2 rounded border border-gray-700 text-[10px] text-gray-400 hover:bg-gray-800">30</button><button onclick="setXP(50)" id="xp-50" class="flex-1 py-2 rounded border border-cyan-500/50 bg-cyan-500/10 text-[10px] text-cyan-400 font-bold">50</button></div></div>
            </div>
            <button onclick="confirmAddTask()" class="w-full py-3 bg-cyan-600 hover:bg-cyan-500 text-white font-bold rounded-lg transition-colors font-ui">确认下达</button>
        </div>
    </div>

    <div id="history-modal" class="modal-overlay" onclick="if(event.target===this) this.style.display='none'">
        <div class="modal-content bg-[#131316] border border-gray-700 w-[380px] p-6 rounded-xl">
            <div class="flex justify-between items-center mb-4 pb-3 border-b border-gray-800"><h3 id="hist-date" class="text-white font-bold text-lg font-code">2026-01-01</h3><span id="hist-total" class="text-cyan-400 font-mono font-bold text-lg">+0 XP</span></div>
            <div id="hist-list" class="space-y-2 max-h-[300px] overflow-y-auto custom-scroll"></div>
        </div>
    </div>

    <div id="data-modal" class="modal-overlay" onclick="if(event.target===this) this.style.display='none'">
        <div class="modal-content bg-[#131316] border border-gray-700 w-[400px] p-6 rounded-xl">
            <h3 class="text-white font-bold mb-2 font-ui"><i class="fa-solid fa-database mr-2"></i>Data Console</h3>
            <div class="space-y-3 mt-6">
                <button onclick="exportData()" class="w-full py-3 border border-gray-600 hover:border-cyan-400 hover:text-cyan-400 text-gray-300 rounded-lg transition-all font-code text-xs flex items-center justify-center gap-2"><i class="fa-solid fa-download"></i> EXPORT DATA</button>
                <div class="relative"><input type="file" id="import-file" onchange="importData(this)" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"><button class="w-full py-3 border border-gray-600 hover:border-purple-400 hover:text-purple-400 text-gray-300 rounded-lg transition-all font-code text-xs flex items-center justify-center gap-2"><i class="fa-solid fa-upload"></i> IMPORT DATA</button></div>
                <button onclick="if(confirm('Reset all data?')) { localStorage.removeItem('catfood_os_v8_1'); location.reload(); }" class="w-full py-3 border border-red-900/50 text-red-700 hover:bg-red-900/20 hover:text-red-500 rounded-lg transition-all font-code text-xs"><i class="fa-solid fa-skull mr-2"></i> HARD RESET</button>
            </div>
        </div>
    </div>

    <script>
        /* --- CORE SYSTEM --- */
        let state = { currentXP: 50, taskType: 'work', viewDate: new Date(), filter: 'all' };
        const TAGS = [
            { label: '今日小成就', icon: '✨', color: 'text-yellow-400 border-yellow-500' },
            { label: '踩坑记录', icon: '💀', color: 'text-gray-400 border-gray-500' },
            { label: 'AI 灵感', icon: '💡', color: 'text-cyan-400 border-cyan-500' }
        ];
        let currentTag = TAGS[0];
        const defaultDB = { totalXP: 0, stats: { int: 0, vit: 0, chr: 0 }, tasks: [], rituals: [], okrs: [{ id: 1, title: "Q1 核心目标", krs: [] }], weekly: [], history: [], reviews: [] };
        let saved = JSON.parse(localStorage.getItem('catfood_os_v8_1'));
        let db = { ...defaultDB, ...saved };
        if (!db.stats) db.stats = { int: 0, vit: 0, chr: 0 };
        if (!db.history) db.history = [];

        function saveDB() { localStorage.setItem('catfood_os_v8_1', JSON.stringify(db)); updateHUD(); }
        function updateHUD() {
            document.getElementById('total-xp').innerText = db.totalXP || 0;
            document.getElementById('xp-bar').style.width = `${(db.totalXP % 1000) / 10}%`;
            const s = db.stats || {int:0, vit:0, chr:0};
            document.getElementById('val-int').innerText = s.int; document.getElementById('bar-int').style.width = Math.min(100, s.int)+'%';
            document.getElementById('val-vit').innerText = s.vit; document.getElementById('bar-vit').style.width = Math.min(100, s.vit)+'%';
            document.getElementById('val-chr').innerText = s.chr; document.getElementById('bar-chr').style.width = Math.min(100, s.chr)+'%';
        }
        function updateClock() { document.getElementById('clock-time').innerText = new Date().toLocaleTimeString('en-US', {hour12: false}); }
        setInterval(updateClock, 1000);

        /* --- ROUTER --- */
        function router(page) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`nav-${page}`).classList.add('active');
            const container = document.getElementById('app-container');
            const header = document.getElementById('header-action');
            container.innerHTML = '';
            const meta = { 'daily': { t: '今日行动代号', s: '/// TACTICAL OPERATIONS' }, 'plan': { t: '战略部署控制台', s: '/// STRATEGIC COMMAND' }, 'stats': { t: '能量监控中心', s: '/// ANALYTICS & METRICS' }, 'review': { t: '指挥官日志', s: '/// BLACKBOX ARCHIVES' } };
            document.getElementById('page-title').innerText = meta[page].t; document.getElementById('page-subtitle').innerText = meta[page].s;
            if (page === 'daily') { header.innerHTML = `<button onclick="document.getElementById('add-modal').style.display='flex'" class="bg-cyan-600 hover:bg-cyan-500 text-white px-4 py-2 rounded-lg font-bold text-xs shadow-lg shadow-cyan-500/20 transition-all font-ui"><i class="fa-solid fa-plus mr-2"></i>新增指令</button>`; renderDaily(container); } 
            else if (page === 'plan') { header.innerHTML = ''; renderPlan(container); }
            else if (page === 'stats') { header.innerHTML = `<div class="flex gap-2 text-xs bg-[#131316] p-1 rounded-lg border border-gray-700 font-code"><button onclick="changeMonth(-1)" class="px-3 hover:text-white text-gray-500"><</button><span id="cal-header" class="px-2 font-bold text-cyan-400 self-center">...</span><button onclick="changeMonth(1)" class="px-3 hover:text-white text-gray-500">></button></div>`; renderStats(container); }
            else if (page === 'review') { header.innerHTML = ''; renderReview(container); }
        }

        /* --- VIEW RENDERERS --- */
        function renderDaily(c) {
            const todayStr = new Date().toISOString().split('T')[0];
            const tasksHtml = db.tasks.map(t => `<div class="group flex items-center gap-4 p-4 bg-[#0f0f12] border border-gray-800 rounded-xl hover:border-gray-600 transition-all ${t.done ? 'opacity-40' : ''}"><div onclick="toggleTask(${t.id})" class="w-5 h-5 rounded border border-gray-600 flex items-center justify-center cursor-pointer ${t.done ? 'bg-cyan-600 border-cyan-600 text-white' : 'hover:border-cyan-500'}">${t.done ? '<i class="fa-solid fa-check text-[10px]"></i>' : ''}</div><span class="flex-1 ${t.done ? 'line-through text-gray-500' : 'text-gray-200'} font-medium text-sm font-ui">${t.title}</span><span class="text-[10px] px-2 py-0.5 rounded border border-gray-700 text-gray-400 font-code">+${t.xp} XP</span><button onclick="deleteItem('tasks', ${t.id})" class="del-btn text-gray-600 hover:text-red-500 px-2"><i class="fa-solid fa-trash"></i></button></div>`).join('');
            const ritualsHtml = db.rituals.map(r => {
                const done = r.history.includes(todayStr); let dots = ''; for(let i=6; i>=0; i--) { const d = new Date(); d.setDate(new Date().getDate() - i); dots += `<div class="h-dot ${r.history.includes(d.toISOString().split('T')[0]) ? 'filled' : ''}"></div>`; }
                return `<div class="group ritual-card cursor-pointer ${done ? 'active' : ''}" onclick="toggleRitual(${r.id})"><button onclick="event.stopPropagation(); deleteItem('rituals', ${r.id})" class="del-btn absolute top-2 right-2 text-gray-600 hover:text-red-500 p-1"><i class="fa-solid fa-times"></i></button><div class="flex justify-between items-start"><div class="text-3xl">${r.icon}</div>${done?'<i class="fa-solid fa-star text-yellow-500 animate-bounce"></i>':''}</div><div><div class="font-bold text-gray-200 text-base mb-1 font-ui">${r.title}</div><div class="flex justify-between items-center text-[10px] text-gray-500 font-code"><span>+${r.xp} XP</span><span>S: ${r.history.length}</span></div><div class="flex gap-1.5 mt-3">${dots}</div></div></div>`;
            }).join('');
            c.innerHTML = `<div class="grid grid-cols-1 lg:grid-cols-12 gap-8 h-full"><div class="lg:col-span-7 flex flex-col gap-4"><h4 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest font-code">WORK QUEUE</h4><div class="space-y-3">${tasksHtml || '<div class="text-center py-8 text-gray-600 text-xs border border-dashed border-gray-800 rounded-xl font-code">NO ACTIVE COMMANDS</div>'}</div></div><div class="lg:col-span-5 flex flex-col gap-4 lg:pl-6 lg:border-l border-white/5"><h4 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest font-code">BIO-RHYTHM</h4><div class="grid grid-cols-2 gap-3">${ritualsHtml}</div></div></div>`;
        }

        function renderPlan(c) {
            const okrHtml = db.okrs.map(o => {
                const p = o.krs.length ? Math.round((o.krs.filter(k=>k.done).length / o.krs.length)*100) : 0;
                const krs = o.krs.map(k => `<div class="flex items-center gap-3 py-2 border-b border-gray-800/50 hover:bg-white/5 px-2 rounded group"><div onclick="toggleKR(${o.id},${k.id})" class="w-4 h-4 rounded border border-gray-600 flex items-center justify-center cursor-pointer ${k.done?'bg-purple-600 border-purple-600':''}">${k.done?'<i class="fa-solid fa-check text-[8px] text-white"></i>':''}</div><span class="text-sm ${k.done?'text-gray-500 line-through':'text-gray-300'} flex-1 font-ui">${k.text}</span><button onclick="deleteKR(${o.id},${k.id})" class="del-btn text-gray-500 hover:text-red-500"><i class="fa-solid fa-trash"></i></button></div>`).join('');
                return `<div class="glass-panel p-6 rounded-xl mb-6 relative overflow-hidden group"><button onclick="deleteOKR(${o.id})" class="del-btn absolute top-4 right-4 text-gray-600 hover:text-red-500 z-20"><i class="fa-solid fa-trash-can"></i></button><div class="relative z-10"><div class="flex justify-between items-center mb-4"><input type="text" value="${o.title}" onchange="updateOkrTitle(${o.id},this.value)" class="bg-transparent text-lg font-bold text-white outline-none w-full border-b border-transparent hover:border-gray-700 focus:border-purple-500 font-ui"><span class="text-xl font-bold text-cyan-400 font-code ml-4">${p}%</span></div><div class="progress-track mb-4"><div class="progress-bar" style="width: ${p}%"></div></div><div class="bg-[#0f0f11] rounded-lg p-2 border border-gray-800">${krs}<input type="text" placeholder="+ Add Key Result" class="bg-transparent text-xs text-white w-full outline-none px-2 mt-2 pt-2 border-t border-gray-800 font-code" onkeydown="if(event.key==='Enter') addKR(${o.id},this.value)"></div></div></div>`;
            }).join('');
            const weekly = db.weekly.map(w => `<div class="flex items-center gap-3 p-3 bg-[#0f0f11] border border-gray-800 rounded-lg mb-2 group"><input type="checkbox" ${w.done?'checked':''} onchange="toggleWeekly(${w.id})" class="accent-cyan-500 cursor-pointer"><span class="text-sm ${w.done?'text-gray-500 line-through':'text-gray-300'} flex-1 font-ui">${w.text}</span><button onclick="deleteWeekly(${w.id})" class="del-btn text-gray-500 hover:text-red-500"><i class="fa-solid fa-times"></i></button></div>`).join('');
            c.innerHTML = `<div class="max-w-4xl mx-auto">${okrHtml}<button onclick="addOKR()" class="w-full py-2 border border-dashed border-gray-700 text-gray-500 rounded-xl hover:border-purple-500 hover:text-purple-400 mb-8 font-code text-xs">+ ADD OBJECTIVE</button><div class="glass-panel p-6 rounded-xl"><div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-2"><h3 class="text-cyan-400 text-xs font-bold uppercase font-code">WEEKLY SPRINT</h3><button onclick="addWeekly()" class="text-xs bg-gray-800 px-2 py-1 rounded text-white">+ Add</button></div><div>${weekly}</div></div></div>`;
        }

        function renderStats(c) {
            const y = state.viewDate.getFullYear(); const m = state.viewDate.getMonth(); document.getElementById('cal-header').innerText = `${y}.${String(m+1).padStart(2,'0')}`;
            const firstDay = new Date(y, m, 1).getDay(); const daysInMonth = new Date(y, m+1, 0).getDate(); const padding = firstDay === 0 ? 6 : firstDay - 1;
            let calHtml = ''; for(let i=0; i<padding; i++) calHtml += `<div class="cal-cell empty"></div>`;
            for(let d=1; d<=daysInMonth; d++) { const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; const log = db.history ? db.history.find(h => h.date === dateStr) : null; const xp = log ? log.xp : 0; let heat = xp>100 ? 'heat-3' : xp>50 ? 'heat-2' : xp>0 ? 'heat-1' : ''; calHtml += `<div class="cal-cell ${heat}" onclick="showHistory('${dateStr}')"><span class="cal-date">${d}</span>${xp>0?`<div class="mt-1 w-full h-1 bg-gray-700 rounded-full overflow-hidden"><div class="h-full bg-cyan-400" style="width:${Math.min(100,xp)}%"></div></div>`:''}</div>`; }
            let trendPoints = ""; const today = new Date(); for(let i=6; i>=0; i--) { const d = new Date(); d.setDate(today.getDate() - i); const ds = d.toISOString().split('T')[0]; const h = db.history ? db.history.find(x => x.date === ds) : null; const val = h ? h.xp : 0; trendPoints += `${(i/6)*100},${100 - Math.min(100, val)} `; }
            c.innerHTML = `<div class="max-w-5xl mx-auto h-full flex flex-col gap-6"><div class="glass-panel p-6 rounded-xl flex-1"><div class="week-header">${['MON','TUE','WED','THU','FRI','SAT','SUN'].map(d=>`<div class="week-day">${d}</div>`).join('')}</div><div class="calendar-grid">${calHtml}</div></div><div class="glass-panel p-4 rounded-xl relative overflow-hidden h-32"><h4 class="text-[10px] text-gray-500 font-bold uppercase font-code mb-2">7-DAY MOMENTUM</h4><svg viewBox="0 0 100 100" preserveAspectRatio="none" class="w-full h-20"><polyline points="${trendPoints}" fill="none" stroke="#06b6d4" stroke-width="2" /><polygon points="0,100 ${trendPoints} 100,100" fill="url(#gradCyan)" opacity="0.2" /><defs><linearGradient id="gradCyan" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="transparent"/></linearGradient></defs></svg></div></div>`;
        }

        function renderReview(c) {
            const logs = state.filter === 'all' ? db.reviews : db.reviews.filter(r => r.tag === state.filter);
            const html = logs.map(l => `<div class="timeline-item"><div class="t-dot"></div><div class="text-xs text-purple-400 font-code mb-1">${l.time}</div><div class="bg-[#0f0f11] p-3 rounded-xl border border-gray-800"><span class="inline-block text-[10px] px-2 py-0.5 rounded border mb-2 font-code ${l.color}">${l.tag}</span><p class="text-gray-300 text-sm whitespace-pre-wrap font-ui leading-relaxed">${l.content}</p></div></div>`).join('');
            c.innerHTML = `
                <div class="max-w-3xl mx-auto h-full flex flex-col">
                    <div class="glass-panel p-6 rounded-xl mb-6 shrink-0">
                        <div class="flex gap-2 mb-4">${TAGS.map(t => `<div onclick="selectTag('${t.label}')" class="tag-pill ${currentTag.label === t.label ? 'active' : ''}"><span>${t.icon}</span> ${t.label}</div>`).join('')}</div>
                        <textarea id="rv-input" class="w-full bg-[#0a0a0c] border border-gray-800 rounded-lg p-4 text-gray-200 outline-none h-32 resize-none focus:border-purple-500 font-ui text-sm transition-all placeholder-gray-600" placeholder="输入记录内容... (默认为${currentTag.label})"></textarea>
                        <div class="flex justify-between items-center mt-4"><div class="flex gap-2 items-center"><span class="text-xs text-gray-500 mr-1">过滤器:</span><div onclick="setFilter('all')" class="filter-pill ${state.filter==='all'?'active':''}">全部</div>${TAGS.map(t => `<div onclick="setFilter('${t.label}')" class="filter-pill ${state.filter===t.label?'active':''}">${t.label}</div>`).join('')}</div><button onclick="addReviewLog()" class="bg-purple-600 hover:bg-purple-500 text-white px-5 py-2 rounded-lg text-xs font-bold font-ui shadow-lg shadow-purple-500/20 transition-all">归档记录</button></div>
                    </div>
                    <div class="flex-1 overflow-y-auto custom-scroll pl-1 pr-2 pt-2">${html||'<div class="text-center text-gray-600 mt-10 font-code text-xs">NO ARCHIVES FOUND</div>'}</div>
                </div>`;
        }

        /* --- HANDLERS --- */
        function setTaskType(t) { state.taskType = t; document.getElementById('btn-type-work').className = t==='work' ? "flex-1 py-2 rounded border text-xs font-bold transition-all border-blue-500/50 bg-blue-500/10 text-blue-400" : "flex-1 py-2 rounded border text-xs font-bold transition-all border-gray-700 text-gray-500"; document.getElementById('btn-type-ritual').className = t==='ritual' ? "flex-1 py-2 rounded border text-xs font-bold transition-all border-green-500/50 bg-green-500/10 text-green-400" : "flex-1 py-2 rounded border text-xs font-bold transition-all border-gray-700 text-gray-500"; }
        function setXP(x) { state.currentXP = x; [10,30,50].forEach(v => document.getElementById(`xp-${v}`).className = v===x ? "flex-1 py-2 rounded border border-cyan-500/50 bg-cyan-500/10 text-[10px] text-cyan-400 font-bold" : "flex-1 py-2 rounded border border-gray-700 text-[10px] text-gray-400 hover:bg-gray-800"); }
        function confirmAddTask() { const t = document.getElementById('new-task-title').value; if(!t) return; if(state.taskType==='work') db.tasks.unshift({id:Date.now(), title:t, xp:state.currentXP, done:false}); else db.rituals.push({id:Date.now(), title:t, icon:"✨", xp:state.currentXP, history:[]}); saveDB(); document.getElementById('add-modal').style.display='none'; router('daily'); }
        function deleteItem(arr, id) { if(confirm('确认删除?')) { db[arr] = db[arr].filter(i=>i.id!==id); saveDB(); router('daily'); } }
        function toggleTask(id) { const t=db.tasks.find(i=>i.id===id); t.done=!t.done; if(t.done){ db.totalXP+=t.xp; db.stats.int+=2; logHist('战术',t.title,t.xp); } else { db.totalXP-=t.xp; db.stats.int-=2; } saveDB(); router('daily'); }
        function toggleRitual(id) { const r=db.rituals.find(i=>i.id===id); const today=new Date().toISOString().split('T')[0]; if(!r.history.includes(today)) { r.history.push(today); db.totalXP+=r.xp; db.stats.vit+=2; logHist('习惯',r.title,r.xp); } else { r.history = r.history.filter(d=>d!==today); db.totalXP-=r.xp; db.stats.vit-=2; } saveDB(); router('daily'); }
        function addOKR() { db.okrs.push({id:Date.now(), title:"New Objective", krs:[]}); saveDB(); router('plan'); }
        function deleteOKR(id) { if(confirm('Delete OKR?')) { db.okrs=db.okrs.filter(i=>i.id!==id); saveDB(); router('plan'); } }
        function updateOkrTitle(id,v) { db.okrs.find(i=>i.id===id).title=v; saveDB(); }
        function addKR(oid,t) { if(t) db.okrs.find(i=>i.id===oid).krs.push({id:Date.now(), text:t, done:false}); saveDB(); router('plan'); }
        function deleteKR(oid,kid) { const o=db.okrs.find(i=>i.id===oid); o.krs=o.krs.filter(k=>k.id!==kid); saveDB(); router('plan'); }
        function toggleKR(oid,kid) { const k=db.okrs.find(i=>i.id===oid).krs.find(x=>x.id===kid); k.done=!k.done; saveDB(); router('plan'); }
        function addWeekly() { const t=prompt('Task:'); if(t) db.weekly.push({id:Date.now(), text:t, done:false}); saveDB(); router('plan'); }
        function deleteWeekly(id) { db.weekly=db.weekly.filter(i=>i.id!==id); saveDB(); router('plan'); }
        function toggleWeekly(id) { const i=db.weekly.find(x=>x.id===id); i.done=!i.done; saveDB(); router('plan'); }
        function logHist(type, title, xp) { const d = new Date().toISOString().split('T')[0]; let h = db.history.find(x => x.date === d); if(!h) { h = { date: d, xp: 0, logs: [] }; db.history.push(h); } h.xp += xp; h.logs.push({ time: new Date().toLocaleTimeString(), action: `[${type}] ${title}`, val: xp }); if(h.xp>=100) db.stats.chr+=1; } 
        function showHistory(dStr) { const h = db.history.find(x => x.date === dStr); const list = document.getElementById('hist-list'); document.getElementById('hist-date').innerText = dStr; if(h) { document.getElementById('hist-total').innerText = `+${h.xp} XP`; list.innerHTML = h.logs.map(l => `<div class="flex justify-between text-xs bg-black/30 p-2 rounded border border-gray-800"><span class="text-gray-400">${l.time}</span><span class="text-gray-200 truncate flex-1 mx-2">${l.action}</span><span class="text-cyan-400 font-bold">+${l.val}</span></div>`).join(''); } else { document.getElementById('hist-total').innerText = "0 XP"; list.innerHTML = "<div class='text-center text-gray-500 py-4 font-code text-xs'>NO DATA LOGGED</div>"; } document.getElementById('history-modal').style.display = 'flex'; }
        function selectTag(label) { currentTag = TAGS.find(t => t.label === label); renderReview(document.getElementById('app-container')); }
        function setFilter(f) { state.filter = f; renderReview(document.getElementById('app-container')); }
        function addReviewLog() { const txt = document.getElementById('rv-input').value; if(!txt) return; const now = new Date(); db.reviews.unshift({ time: `${now.toISOString().split('T')[0]} ${now.toLocaleTimeString()}`, tag: currentTag.label, color: currentTag.color, content: txt }); saveDB(); router('review'); }
        function openDataModal() { document.getElementById('data-modal').style.display='flex'; }
        function exportData() { const blob = new Blob([JSON.stringify(db)], {type: 'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `catfood_os_backup.json`; a.click(); }
        function importData(input) { const file = input.files[0]; if(!file) return; const reader = new FileReader(); reader.onload = function(e) { try { db = { ...defaultDB, ...JSON.parse(e.target.result) }; saveDB(); location.reload(); } catch(err) { alert("Invalid File"); } }; reader.readAsText(file); }
        function changeMonth(d) { state.viewDate.setMonth(state.viewDate.getMonth()+d); router('stats'); }

        window.onload = () => { updateHUD(); router('daily'); };
    </script>
</body>
</html>
